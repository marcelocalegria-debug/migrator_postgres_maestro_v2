# config_smalltables.yaml
# ========================
# Configuração dedicada para migração paralela das ~901 tabelas pequenas.
# Usado exclusivamente pelo: python migrator_smalltables.py --small-tables
#
# As tabelas grandes já migradas por migrator.py / migrator_parallel_doc_oper.py
# são excluídas automaticamente via exclude_tables abaixo.

firebird:
  host: "localhost"
  port: 3050
  database: "/firebird/data/c6emb.fdb"
  user: "SYSDBA"
  password: "masterkey"
  #charset: "WIN1252"
  charset: iso-8859-1

postgresql:
  host: "localhost"
  port: 5435
  database: "c6_alegria"
  user: "c6_alegria_user"
  password: "5tEkZZwRydTUXarJ"
  schema: "public"

migration:
  # Deixado vazio — tabelas descobertas automaticamente via RDB$RELATIONS
  tables: []

  batch_size: 5000           # [PERF] linhas por batch COPY (menor que tabelas grandes)
  fetch_array_size: 5000     # [PERF] buffer do cursor Firebird
  max_retries: 3
  retry_delay_seconds: 3

  # ─── Configurações exclusivas do modo --small-tables ──────────────────────
  parallel_workers: 4        # Processos paralelos (servidor 12 CPUs / 32GB RAM)

  # Tabelas migradas por migrator.py e migrator_parallel_doc_oper.py
  # (excluídas da auto-descoberta via RDB$RELATIONS)
  exclude_tables:
    - DOCUMENTO_OPERACAO
    - LOG_EVENTOS
    - HISTORICO_OPERACAO
    - OCORRENCIA_SISAT
    - OCORRENCIA
    - NMOV
    - OPERACAO_CREDITO
    - PARCELASCTB
    - PESSOA_PRETENDENTE
    - CONTROLEVERSAO

  # Arquivo SQLite com estado global das 901 tabelas (status por tabela)
  master_state_db: "migration_state_smalltables_master.db"

performance:
  work_mem: "256MB"
  maintenance_work_mem: "1GB"

logging:
  level: "INFO"
  file: "migration_smalltables.log"   # Log do processo principal (orquestrador)
  console: true
  # Nota: cada worker gera seu próprio log: migration_{dest_table}.log
